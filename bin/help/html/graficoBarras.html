<h1>7 - Gráfico barras</h1>
<p>Genera un informe con un gráfico de barras</p>

<h2>Qué hace</h2>
<ul>
  <li>Compila el JRXML y lo rellena usando la <b>conexión JDBC</b>.</li>
  <li>Abre visor y exporta a PDF.</li>
</ul>

<h2>JRXML</h2>
<ul>
  <li><b>grafico1.jrxml</b></li>
</ul>

<h2>Parámetros</h2>
<ul>
  <li><b>p_fecha</b>: fecha actual</li>
  <li><b>p_registro</b>: código REG-...</li>
</ul>

<h2>Notas</h2>
<p>No requiere rellenar campos.</p>
</body>
</html>
